<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="pf-bg" cx="28%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#e8ecf4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#070b14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pf-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7fa" stop-opacity="0.1"/>
      <stop offset="45%" stop-color="#c8d4e8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#8b7cff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="pf-tile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="#070b14"/>
  <rect width="400" height="250" fill="url(#pf-bg)"/>
  <!-- Minimal mark + rule -->
  <circle cx="196" cy="28" r="3" fill="rgba(255,255,255,0.35)"/>
  <line x1="48" y1="44" x2="352" y2="44" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Single large featured frame -->
  <rect x="56" y="62" width="288" height="128" rx="2" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <rect x="72" y="78" width="148" height="96" rx="1" fill="url(#pf-hero)"/>
  <line x1="236" y1="90" x2="320" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="236" y1="108" x2="304" y2="108" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="236" y1="122" x2="288" y2="122" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="236" y1="136" x2="272" y2="136" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="236" y1="154" x2="312" y2="154" stroke="rgba(110,231,255,0.35)" stroke-width="1"/>
  <!-- Two wide gallery strips -->
  <rect x="56" y="206" width="160" height="32" rx="1" fill="url(#pf-tile)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="232" y="206" width="112" height="32" rx="1" fill="url(#pf-tile)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>

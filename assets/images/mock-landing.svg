<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="lp-glow" cx="50%" cy="12%" r="65%">
      <stop offset="0%" stop-color="#4da6ff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#4da6ff" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#070b14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lp-cta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="50%" stop-color="#5eb5ff"/>
      <stop offset="100%" stop-color="#6ee7ff"/>
    </linearGradient>
    <radialGradient id="lp-vignette" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#070b14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#02060f" stop-opacity="0.88"/>
    </radialGradient>
  </defs>
  <rect width="400" height="250" fill="#050810"/>
  <rect width="400" height="250" fill="url(#lp-glow)"/>
  <rect width="400" height="250" fill="url(#lp-vignette)"/>
  <!-- Compact nav -->
  <rect x="32" y="20" width="76" height="11" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="288" y="21" width="80" height="22" rx="11" fill="rgba(77,166,255,0.2)" stroke="rgba(110,231,255,0.45)" stroke-width="1"/>
  <!-- Bold centered stack -->
  <rect x="40" y="78" width="320" height="22" rx="4" fill="rgba(255,255,255,0.22)"/>
  <rect x="72" y="110" width="256" height="14" rx="3" fill="rgba(255,255,255,0.14)"/>
  <rect x="88" y="134" width="224" height="9" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="112" y="162" width="176" height="40" rx="20" fill="url(#lp-cta)"/>
  <rect x="112" y="162" width="176" height="40" rx="20" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <!-- Focus row: three strong blocks -->
  <rect x="32" y="218" width="104" height="22" rx="4" fill="rgba(77,166,255,0.18)" stroke="rgba(77,166,255,0.35)" stroke-width="1"/>
  <rect x="148" y="218" width="104" height="22" rx="4" fill="rgba(110,231,255,0.12)" stroke="rgba(110,231,255,0.3)" stroke-width="1"/>
  <rect x="264" y="218" width="104" height="22" rx="4" fill="rgba(139,124,255,0.15)" stroke="rgba(139,124,255,0.32)" stroke-width="1"/>
